<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <link rel="stylesheet" href="popup.css">
  <title>BroBlock</title>
</head>
<body>
  <header class="header">
    <div class="header-row">
      <span class="header-name">BroBlock</span>
      <label class="toggle">
        <input type="checkbox" id="toggleEnabled" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
    <p class="tagline" id="tagline"></p>
  </header>

  <section class="sensitivity">
    <span class="sensitivity-value" id="sensitivityValue">Balanced</span>
    <input type="range" id="sensitivitySlider" min="15" max="85" value="60" class="slider">
    <div class="sensitivity-range">
      <span>Chill</span>
      <span>Aggressive</span>
    </div>
  </section>

  <button class="test-btn" id="testBtn">Test</button>

  <footer class="footer">
    <span class="footer-credit">Made with disgust by <a href="https://x.com/comforteagle/status/2027589656552812546" target="_blank" rel="noopener">@ComfortEagle</a></span>
    <span class="footer-sep">&middot;</span>
    <button class="reset-btn" id="resetBtn">reset</button>
  </footer>

  <script src="constants.js"></script>
  <script src="popup.js"></script>
</body>
</html>
